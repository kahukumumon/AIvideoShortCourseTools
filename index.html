<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI動画短期講座ツール</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
  <main class="page page-home">
    <section class="hero">
      <h1>AI動画短期講座ツール</h1>
    </section>

    <section class="tool-grid" aria-label="ツール一覧">
      <a class="tool-card tool-card-concat" href="tools/concat">
        <span class="card-tag">VIDEO</span>
        <h2>動画連結</h2>
        <p>複数動画を順番に並べてまとめます。</p>
      </a>

      <a class="tool-card tool-card-ugoira" href="tools/ugoira">
        <span class="card-tag">UGOIRA</span>
        <h2>うごイラ</h2>
        <p>動画を指定範囲で切り出し、連番 JPG を zip にまとめて書き出します。</p>
      </a>

      <a class="tool-card tool-card-pixiv" href="tools/pixiv">
        <span class="card-tag">IMAGE</span>
        <h2>pixivリサイズ</h2>
        <p>正方形クロップを確認しながら、900×900 の投稿向け画像へ変換します。</p>
      </a>

      <a class="tool-card tool-card-character" href="tools/character">
        <span class="card-tag">PROMPT</span>
        <h2>オリキャラ設定</h2>
        <p>選択内容から pnginfo テキストを組み立てて、そのままコピーできます。</p>
      </a>
    </section>
  </main>
</body>
</html>
